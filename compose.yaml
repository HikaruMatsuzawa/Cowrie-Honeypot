services:
  cowrie:
    image: ${COWRIE_IMAGE:-cowrie/cowrie:latest}
    container_name: cowrie-observer
    restart: unless-stopped
    ports:
      - "${COWRIE_SSH_BIND_ADDRESS:-127.0.0.1}:${COWRIE_SSH_PORT:-2222}:2222"
      - "${COWRIE_TELNET_BIND_ADDRESS:-127.0.0.1}:${COWRIE_TELNET_PORT:-2223}:2223"
    environment:
      TZ: ${TZ:-UTC}
    networks:
      cowrie-net:
        ipv4_address: ${COWRIE_CONTAINER_IP:-172.30.0.10}
    volumes:
      - type: bind
        source: ./logs/cowrie
        target: /cowrie/cowrie-git/var/log/cowrie
      - type: bind
        source: ./data/downloads
        target: /cowrie/cowrie-git/var/lib/cowrie/downloads

networks:
  cowrie-net:
    ipam:
      config:
        - subnet: ${COWRIE_NETWORK_SUBNET:-172.30.0.0/24}
