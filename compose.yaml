services:
  cowrie:
    image: ${COWRIE_IMAGE:-cowrie/cowrie:latest}
    container_name: cowrie-observer
    restart: unless-stopped
    expose:
      - "2222"
    environment:
      TZ: ${TZ:-UTC}
    networks:
      - cowrie-net
    volumes:
      - type: bind
        source: ./logs/cowrie
        target: /cowrie/cowrie-git/var/log/cowrie
      - type: bind
        source: ./data/downloads
        target: /cowrie/cowrie-git/var/lib/cowrie/downloads

  cowrie-ssh-proxy:
    image: alpine/socat:latest
    container_name: cowrie-ssh-proxy
    restart: unless-stopped
    depends_on:
      - cowrie
    command: "tcp-listen:2222,fork,reuseaddr tcp-connect:cowrie:2222"
    ports:
      - "127.0.0.1:${COWRIE_LOCAL_SSH_PORT:-2222}:2222"
    networks:
      - cowrie-net
      - proxy-net

networks:
  cowrie-net:
    internal: true
  proxy-net:
